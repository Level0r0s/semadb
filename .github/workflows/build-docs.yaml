name: Build Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'

# Credit: https://gohugo.io/hosting-and-deployment/hosting-on-github/
# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued.  However, do NOT cancel in-progress runs as we
# want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      GO_VERSION: 1.25.6
      HUGO_VERSION: 0.148.2
    steps:
      - uses: actions/checkout@v4
    # Compile redoc
      - uses: actions/setup-node@v4
      - run: npx @redocly/cli build-docs openapi.yaml 
        working-directory: httpapi/v2
      - run: mv httpapi/v2/redoc-static.html docs/static/api-reference.html
    # Compile hugo website
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Copy existing readme
        run: cp README.md docs/content/_index.md
      - name: Copy configuration
        run: sed -i -e '/__REPLACE__/{r config/singleServer.yaml' -e 'd}' docs/content/docs/configuration.md

      # - name: Add GA ID from repo variables
      #   if: ${{ vars.DOCS_GA_ID }}
      #   run: sed -i "s/__REPLACE_GA_ID__/${{ vars.DOCS_GA_ID }}/" docs/hugo.yaml

      - name: Add privacy friendly tracking script from repo variables
        if: ${{ vars.DOCS_TRACKING_SCRIPT }}
        run: echo "${{ vars.DOCS_TRACKING_SCRIPT }}" >> docs/layouts/partials/docs/inject/head.html

      - name: Build website
        working-directory: docs
        run: hugo

      - name: Setup pages
        uses: actions/configure-pages@v5
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
